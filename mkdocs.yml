site_name: "Kurisu's life"
site_url: https://mydomain.org/mysite
theme:
  name: material
  theme:
  palette: 

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.preview
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy


plugins:
  - search
  - tags
  - blog
    

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences



nav:
   - Home: index.md
   - Codici:
       - Python: coding/my-first-python-file.md
   - Su di me: 
       - Diversi link: Su di me/project.md
       - La mia storia: Su di me/about.md
       - Cosa frequento: Su di me/childhood.md
   - Tags: tags.md
   - Blog: blog/index.md
